name: Update Streak

on:
  schedule:
    # Runs every day at 00:15 UTC
    - cron: "15 0 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update streak values
        run: python .github/scripts/update_streak.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add README.md
            git commit -m "chore: auto-update contribution streak [skip ci]"
            git push
          fi
